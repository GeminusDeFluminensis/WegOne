mo_pt1 = 1. Objetivo\nEsta política tem como objetivo estabelecer diretrizes claras para o uso responsável, seguro e eficiente da plataforma digital WEG One, destinada à gestão de manuais técnicos, documentos normativos, procedimentos operacionais e conteúdos de apoio às áreas de engenharia, manutenção, automação e treinamentos internos.\n\n2. Abrangência\nAplica-se a todos os colaboradores, parceiros, técnicos credenciados e demais usuários com acesso autorizado à plataforma WEG One, em âmbito nacional e internacional.\n\n3. Diretrizes de Uso\n3.1 Acesso e Autenticação\n- O acesso à plataforma é individual e intransferível.\n- Cada usuário é responsável pela proteção de suas credenciais (login e senha).\n- Em caso de suspeita de uso indevido, o usuário deve comunicar imediatamente ao setor de TI ou à equipe gestora da plataforma.\n\n3.2 Compartilhamento de Conteúdo\n- É proibido o compartilhamento externo de qualquer documento classificado como confidencial ou restrito.\n- O uso de materiais da plataforma para treinamentos ou apresentações externas deve ser previamente autorizado pela área responsável.\n\n3.3 Atualização de Documentos\n- Apenas usuários com perfil técnico-administrativo podem realizar alterações em documentos.\n- Toda atualização deve ser registrada, com data, autor e motivo da modificação, garantindo rastreabilidade.\n\n3.4 Uso Ético e Profissional\n- A plataforma deve ser utilizada exclusivamente para fins profissionais, respeitando os valores e a reputação da WEG.\n- Comentários ofensivos, alterações indevidas ou manipulação de conteúdo técnico são passíveis de penalidades conforme normas internas da empresa.\n\n4. Responsabilidades do Usuário\n- Manter-se atualizado sobre versões e revisões de documentos críticos.\n- Utilizar a plataforma como ferramenta de apoio técnico e tomada de decisão segura.\n- Reportar inconsistências, erros ou falhas de acesso à equipe responsável.\n\n5. Segurança da Informação\nTodos os dados armazenados na WEG One seguem políticas rigorosas de proteção da informação. A plataforma é monitorada continuamente para garantir integridade, disponibilidade e confidencialidade dos documentos.\n\n6. Penalidades\nO descumprimento desta política poderá resultar em advertências, bloqueio de acesso, responsabilização disciplinar ou, em casos mais graves, desligamento da organização e medidas legais cabíveis.\n\n7. Revisão da Política\nEste documento será revisto anualmente ou sempre que houver alterações relevantes na estrutura da plataforma, legislação vigente ou diretrizes corporativas.
mo_es1 = 1. Objetivo\nEsta política tiene como objetivo establecer directrices claras para el uso responsable, seguro y eficiente de la plataforma digital WEG One, destinada a la gestión de manuales técnicos, documentos normativos, procedimientos operativos y contenidos de apoyo para los departamentos de ingeniería, mantenimiento, automatización y formación interna.\n\n2. Alcance\nAplica a todos los empleados, socios, técnicos autorizados y demás usuarios con acceso permitido a la plataforma WEG One, tanto a nivel nacional como internacional.\n\n3. Directrices de Uso\n3.1 Acceso y Autenticación\n- El acceso a la plataforma es personal e intransferible.\n- Cada usuario es responsable de proteger sus credenciales (usuario y contraseña).\n- En caso de sospecha de uso indebido, el usuario debe comunicarlo inmediatamente al departamento de TI o al equipo responsable de la plataforma.\n\n3.2 Compartición de Contenido\n- Está prohibido compartir externamente cualquier documento clasificado como confidencial o restringido.\n- El uso de materiales de la plataforma para formaciones o presentaciones externas debe contar con la autorización previa del área responsable.\n\n3.3 Actualización de Documentos\n- Solo los usuarios con perfil técnico-administrativo pueden realizar modificaciones en los documentos.\n- Toda actualización debe registrarse con fecha, autor y motivo del cambio, garantizando su trazabilidad.\n\n3.4 Uso Ético y Profesional\n- La plataforma debe utilizarse exclusivamente con fines profesionales, respetando los valores y la reputación de WEG.\n- Comentarios ofensivos, modificaciones no autorizadas o manipulación de contenido técnico podrán ser sancionados según las normas internas de la empresa.\n\n4. Responsabilidades del Usuario\n- Mantenerse al día con las versiones y revisiones de los documentos críticos.\n- Utilizar la plataforma como herramienta de apoyo técnico y para una toma de decisiones segura.\n- Informar sobre errores, fallos o problemas de acceso al equipo responsable.\n\n5. Seguridad de la Información\nTodos los datos almacenados en WEG One se rigen por estrictas políticas de protección de la información. La plataforma está monitorizada constantemente para garantizar la integridad, disponibilidad y confidencialidad de los documentos.\n\n6. Sanciones\nEl incumplimiento de esta política podrá conllevar advertencias, suspensión de acceso, medidas disciplinarias o, en casos más graves, la desvinculación de la organización y acciones legales correspondientes.\n\n7. Revisión de la Política\nEste documento será revisado anualmente o siempre que haya cambios relevantes en la estructura de la plataforma, la legislación vigente o las directrices corporativas.
mo_us1 = 1. Purpose\nThis policy aims to establish clear guidelines for the responsible, safe, and efficient use of the WEG One digital platform, intended for managing technical manuals, regulatory documents, operational procedures, and support content for the areas of engineering, maintenance, automation, and internal training.\n\n2. Scope\nThis policy applies to all employees, partners, authorized technicians, and other users with authorized access to the WEG One platform, both nationally and internationally.\n\n3. Usage Guidelines\n3.1 Access and Authentication\n- Access to the platform is personal and non-transferable.\n- Each user is responsible for protecting their credentials (login and password).\n- If misuse is suspected, the user must immediately notify the IT department or the platform management team.\n\n3.2 Content Sharing\n- External sharing of any document classified as confidential or restricted is prohibited.\n- The use of platform materials for training or external presentations must be previously authorized by the responsible department.\n\n3.3 Document Updates\n- Only users with a technical-administrative profile may make changes to documents.\n- All updates must be recorded with the date, author, and reason for modification to ensure traceability.\n\n3.4 Ethical and Professional Use\n- The platform must be used exclusively for professional purposes, respecting WEG’s values and reputation.\n- Offensive comments, improper changes, or manipulation of technical content are subject to penalties according to the company’s internal policies.\n\n4. User Responsibilities\n- Stay up to date with versions and revisions of critical documents.\n- Use the platform as a tool for technical support and secure decision-making.\n- Report inconsistencies, errors, or access issues to the responsible team.\n\n5. Information Security\nAll data stored in WEG One follow strict information protection policies. The platform is continuously monitored to ensure document integrity, availability, and confidentiality.\n\n6. Penalties\nFailure to comply with this policy may result in warnings, access suspension, disciplinary action, or, in more severe cases, termination from the organization and applicable legal measures.\n\n7. Policy Review\nThis document will be reviewed annually or whenever relevant changes occur in the platform structure, applicable legislation, or corporate guidelines.
mo_de1 = 1. Zielsetzung\nDiese Richtlinie hat das Ziel, klare Vorgaben für die verantwortungsvolle, sichere und effiziente Nutzung der digitalen Plattform WEG One zu definieren, die für die Verwaltung von technischen Handbüchern, normativen Dokumenten, Arbeitsanweisungen und unterstützenden Inhalten für die Bereiche Technik, Instandhaltung, Automatisierung und interne Schulungen bestimmt ist.\n\n2. Geltungsbereich\nDiese Richtlinie gilt für alle Mitarbeitenden, Partner, autorisierte Techniker und sonstige Nutzer mit berechtigtem Zugang zur WEG One-Plattform, sowohl national als auch international.\n\n3. Nutzungsrichtlinien\n3.1 Zugriff und Authentifizierung\n- Der Zugang zur Plattform ist persönlich und nicht übertragbar.\n- Jeder Nutzer ist für den Schutz seiner Zugangsdaten (Benutzername und Passwort) selbst verantwortlich.\n- Bei Verdacht auf Missbrauch ist umgehend die IT-Abteilung oder das Plattformmanagement zu informieren.\n\n3.2 Weitergabe von Inhalten\n- Die externe Weitergabe von vertraulichen oder eingeschränkten Dokumenten ist untersagt.\n- Die Nutzung von Materialien der Plattform für Schulungen oder externe Präsentationen muss im Voraus von der zuständigen Abteilung genehmigt werden.\n\n3.3 Dokumentenaktualisierung\n- Nur Nutzer mit technischem-administrativem Profil dürfen Änderungen an Dokumenten vornehmen.\n- Jede Änderung muss mit Datum, Autor und Änderungsgrund dokumentiert werden, um die Nachverfolgbarkeit zu gewährleisten.\n\n3.4 Ethische und professionelle Nutzung\n- Die Plattform darf ausschließlich für berufliche Zwecke genutzt werden, im Einklang mit den Werten und dem Ruf von WEG.\n- Beleidigende Kommentare, unbefugte Änderungen oder Manipulationen technischer Inhalte können gemäß den internen Unternehmensrichtlinien geahndet werden.\n\n4. Pflichten des Nutzers\n- Sich über Versionen und Revisionen kritischer Dokumente auf dem Laufenden halten.\n- Die Plattform als Werkzeug für technische Unterstützung und sichere Entscheidungsfindung nutzen.\n- Unstimmigkeiten, Fehler oder Zugriffsprobleme an das zuständige Team melden.\n\n5. Informationssicherheit\nAlle in WEG One gespeicherten Daten unterliegen strengen Datenschutzrichtlinien. Die Plattform wird kontinuierlich überwacht, um die Integrität, Verfügbarkeit und Vertraulichkeit der Dokumente sicherzustellen.\n\n6. Sanktionen\nDie Nichteinhaltung dieser Richtlinie kann zu Verwarnungen, Sperrung des Zugangs, disziplinarischen Maßnahmen oder in schwerwiegenden Fällen zur Entlassung und rechtlichen Konsequenzen führen.\n\n7. Überprüfung der Richtlinie\nDieses Dokument wird jährlich oder bei relevanten Änderungen in der Plattformstruktur, geltenden Gesetzen oder Unternehmensrichtlinien überprüft.